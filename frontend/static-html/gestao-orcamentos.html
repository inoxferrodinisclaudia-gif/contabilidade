<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestão de Orçamentos | Inox Ferro</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-background text-text">
  <div class="min-h-screen">
    <div class="flex">
      <aside class="hidden w-[280px] shrink-0 border-r border-border bg-surface px-4 py-8 xl:block print:hidden sticky top-0 self-start h-screen overflow-y-auto">
        <div class="mb-10 flex justify-center"><div class="logo">INOX FERRO</div></div>
        <nav class="mt-6 space-y-1">
          <a href="index.html" class="nav-item">Dashboard</a>
          <a href="orcamentos.html" class="nav-item">Orçamentos</a>
          <a href="tabela-precos.html" class="nav-item">Tabela de Preços</a>
          <a href="clientes.html" class="nav-item">Clientes</a>
          <a href="admin.html" class="nav-item">Admin</a>
          <a href="seguranca.html" class="nav-item">Segurança</a>
          <a href="calendario.html" class="nav-item">Calendário</a>
          <a href="gestao-orcamentos.html" class="nav-item nav-item-active">Gestão Orçamentos</a>
        </nav>
      </aside>
      <main class="flex-1 p-6 pt-24">
        <header class="sticky top-0 z-50 rounded-none border-b border-border bg-surface/95 px-4 py-3 backdrop-blur print:hidden">
          <div class="flex items-center justify-between gap-4 container">
            <div class="logo">INOX FERRO</div>
            <button class="btn-soft">Tema</button>
          </div>
        </header>
        <section class="mt-6">
          <div class="rounded-none border border-border bg-surface p-6 print:hidden">
            <h2 class="text-2xl font-semibold text-white">Gestão de Orçamentos</h2>
            <p class="mt-2 text-sm text-gray-400">Veja, edite e elimine orçamentos guardados localmente.</p>
          </div>
          <div class="mt-6 rounded-none border border-border bg-surface p-6">
            <div class="overflow-x-auto">
              <table class="min-w-full text-left text-sm table-clean">
                <thead>
                  <tr class="border-b border-border text-gray-400">
                    <th class="px-3 py-3">Nº</th>
                    <th class="px-3 py-3">Cliente</th>
                    <th class="px-3 py-3">Estado</th>
                    <th class="px-3 py-3">Criado</th>
                    <th class="px-3 py-3">Ações</th>
                  </tr>
                </thead>
                <tbody>
                  <tr class="border-b border-border hover:bg-white/5">
                    <td class="px-3 py-3 text-white">—</td>
                    <td class="px-3 py-3 text-gray-300">Nenhum orçamento disponível</td>
                    <td class="px-3 py-3 text-gray-300">—</td>
                    <td class="px-3 py-3 text-gray-300">—</td>
                    <td class="px-3 py-3">—</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="mt-4">
              <a href="orcamentos.html" class="rounded-none border border-border bg-black px-4 py-3 text-sm uppercase tracking-[0.18em] text-white">Criar novo orçamento</a>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>
</body>
</html>
